<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Markdown Tahrirchi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f5f7fa; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 800px; height: 80vh; display: flex; overflow: hidden; }
        .editor { flex: 1; display: flex; flex-direction: column; }
        textarea { flex: 1; border: none; padding: 20px; font-family: monospace; font-size: 15px; outline: none; resize: none; background: #fafafa; }
        .divider { width: 1px; background: #e0e0e0; }
        .preview { flex: 1; padding: 20px; overflow-y: auto; background: white; }
        .preview h1, .preview h2, .preview h3 { margin-bottom: 10px; color: #2c3e50; }
        .preview p { margin-bottom: 10px; line-height: 1.6; }
        .preview ul { padding-left: 20px; margin-bottom: 10px; }
        .preview code { background: #eee; padding: 2px 6px; border-radius: 4px; font-family: monospace; }
        .preview blockquote { border-left: 4px solid #3498db; padding-left: 15px; color: #555; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="editor">
            <textarea id="input" placeholder="# Sarlavha yozing
**Qalin matn** va *kursiv*
- Ro'yxat elementi
> Iqtibos
`kod qatori`"></textarea>
        </div>
        <div class="divider"></div>
        <div class="preview" id="output"></div>
    </div>

    <script>
        const input = document.getElementById('input');
        const output = document.getElementById('output');

        function parseMarkdown(text) {
            return text
                .replace(/^### (.*$)/gm, '<h3>$1</h3>')
                .replace(/^## (.*$)/gm, '<h2>$1</h2>')
                .replace(/^# (.*$)/gm, '<h1>$1</h1>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/`(.*?)`/g, '<code>$1</code>')
                .replace(/^> (.*$)/gm, '<blockquote>$1</blockquote>')
                .replace(/^- (.*$)/gm, '<ul><li>$1</li></ul>')
                .replace(/\n/g, '<br>');
        }

        input.addEventListener('input', () => {
            output.innerHTML = parseMarkdown(input.value);
        });
        input.dispatchEvent(new Event('input'));
    </script>
</body>
</html>
